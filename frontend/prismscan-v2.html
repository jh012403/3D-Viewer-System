<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>PRISM SCAN — Background Product 3D Asset Generator</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#080c14;--s1:#0d1220;--s2:#111827;--s3:#161f30;
  --b:rgba(255,255,255,0.07);--bb:rgba(255,255,255,0.13);
  --a:#00d4ff;--a2:#0099cc;--ad:rgba(0,212,255,0.08);--ag:rgba(0,212,255,0.22);
  --g:#22c55e;--y:#f59e0b;--r:#ef4444;--pu:#a78bfa;
  --t:#f0f6ff;--s:rgba(139,163,196,1);--m:#4a6080;--f:#1e2d45;
}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--t);font-family:'DM Sans',sans-serif;line-height:1.55;overflow-x:hidden;min-height:100vh}
.d{font-family:'Syne',sans-serif}
.mono{font-family:'JetBrains Mono',monospace;font-feature-settings:'tnum' 1,'zero' 1}
::-webkit-scrollbar{width:3px}
::-webkit-scrollbar-thumb{background:rgba(0,212,255,0.2);border-radius:2px}
input,button,select{font-family:inherit}
button{cursor:pointer}
@keyframes fi{from{opacity:0}to{opacity:1}}
@keyframes fu{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
@keyframes su{from{opacity:0;transform:translateY(12px) scale(.97)}to{opacity:1;transform:none}}
@keyframes sp{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
@keyframes sp2{from{transform:rotate(0deg)}to{transform:rotate(-360deg)}}
@keyframes pu{0%,100%{opacity:.3;transform:scale(1)}50%{opacity:1;transform:scale(1.3)}}
@keyframes sh{0%{left:-100%}100%{left:100%}}
@keyframes bg{0%,100%{box-shadow:0 0 0 1px rgba(0,212,255,0.15)}50%{box-shadow:0 0 0 1px rgba(0,212,255,0.5),0 0 30px rgba(0,212,255,0.1)}}
.page{animation:fi .3s ease}
/* Header */
.hdr{position:fixed;top:0;left:0;right:0;z-index:300;height:58px;display:flex;align-items:center;justify-content:space-between;padding:0 1.5rem;background:rgba(8,12,20,0.6);border-bottom:1px solid transparent;backdrop-filter:blur(20px);transition:all .3s}
.hdr.solid{background:rgba(8,12,20,0.96);border-color:var(--b)}
.logo{display:flex;align-items:center;gap:9px;background:none;border:none;color:var(--t)}
.logo-mark{width:30px;height:30px;border-radius:7px;background:linear-gradient(135deg,var(--a),#0066ff);display:flex;align-items:center;justify-content:center;box-shadow:0 0 18px rgba(0,212,255,0.35);flex-shrink:0}
.logo-wm{font-family:'Syne',sans-serif;font-weight:700;font-size:14px;letter-spacing:.04em}
.logo-wm span{color:var(--a)}
.hdr-r{display:flex;align-items:center;gap:6px}
.hl{background:none;border:none;color:var(--m);font-size:13px;padding:5px 11px;border-radius:6px;transition:color .2s}
.hl:hover,.hl.on{color:var(--t)}
.hl.on{color:var(--a)}
/* Buttons */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:10px 22px;border-radius:8px;border:none;font-size:14px;font-weight:600;letter-spacing:.01em;transition:all .2s cubic-bezier(.34,1.56,.64,1);white-space:nowrap}
.bp{background:linear-gradient(135deg,var(--a),#0066ff);color:#fff}
.bp:hover{box-shadow:0 4px 24px var(--ag);transform:translateY(-1px)}
.bg2{background:rgba(255,255,255,0.05);border:1px solid var(--bb);color:var(--t)}
.bg2:hover{background:rgba(255,255,255,0.09);border-color:rgba(0,212,255,0.4);color:var(--a)}
.bo{background:transparent;border:1px solid rgba(0,212,255,0.4);color:var(--a)}
.bo:hover{background:rgba(0,212,255,0.07)}
.bsm{padding:7px 15px;font-size:13px}
.blg{padding:13px 30px;font-size:15px;border-radius:10px}
.bfull{width:100%}
.btn:disabled{opacity:.4;cursor:not-allowed;transform:none!important;box-shadow:none!important}
/* Chips */
.chip{display:inline-flex;align-items:center;gap:5px;padding:3px 9px;border-radius:999px;font-size:11px;font-weight:600;letter-spacing:.04em;white-space:nowrap}
.cg{background:rgba(34,197,94,0.1);border:1px solid rgba(34,197,94,0.3);color:var(--g)}
.cy{background:rgba(245,158,11,0.1);border:1px solid rgba(245,158,11,0.3);color:var(--y)}
.ca{background:rgba(0,212,255,0.1);border:1px solid rgba(0,212,255,0.3);color:var(--a)}
.cdot::before{content:'';display:inline-block;width:5px;height:5px;border-radius:50%;background:currentColor;animation:pu 2s infinite}
/* Layout helpers */
.sect{padding:4.5rem 2.2rem}
.inner{max-width:1280px;margin:0 auto}
.inmd{max-width:1060px;margin:0 auto}
.insm{max-width:760px;margin:0 auto}
.tc{text-align:center}
.flex{display:flex}.ic{align-items:center}.jb{justify-content:space-between}.gap2{gap:.5rem}.gap3{gap:.75rem}.gap4{gap:1rem}.fw{flex-wrap:wrap}
.mt1{margin-top:.5rem}.mt2{margin-top:1rem}.mt3{margin-top:1.5rem}.mt4{margin-top:2rem}
.mb1{margin-bottom:.5rem}.mb2{margin-bottom:1rem}.mb3{margin-bottom:1.5rem}
.lbl{font-size:10px;font-weight:700;letter-spacing:.09em;color:var(--m);font-family:'Syne',sans-serif}
.eyebrow{font-family:'Syne',sans-serif;font-size:11px;font-weight:700;letter-spacing:.1em;color:var(--a);margin-bottom:10px}
.sec-title{font-family:'Syne',sans-serif;font-size:clamp(1.6rem,3vw,2.3rem);font-weight:800;color:var(--t);letter-spacing:-.02em;margin-bottom:8px}
.divider{height:1px;background:var(--b);margin:1.5rem 0}
/* ══ LANDING ══ */
.hero{min-height:100vh;display:grid;place-items:center;padding:6.8rem 2rem 3.5rem;position:relative;overflow:hidden;text-align:center}
.hgrid{position:absolute;inset:0;background-image:linear-gradient(rgba(0,212,255,0.04) 1px,transparent 1px),linear-gradient(90deg,rgba(0,212,255,0.04) 1px,transparent 1px);background-size:56px 56px;-webkit-mask-image:radial-gradient(ellipse 70% 70% at 50% 50%,black,transparent);mask-image:radial-gradient(ellipse 70% 70% at 50% 50%,black,transparent)}
.hglow{position:absolute;top:50%;left:50%;width:700px;height:700px;background:radial-gradient(circle,rgba(0,212,255,0.07),transparent 65%);transform:translate(-50%,-60%);pointer-events:none}
.hbadge{display:inline-flex;align-items:center;gap:8px;padding:5px 16px;border-radius:999px;margin-bottom:20px;background:rgba(0,212,255,0.07);border:1px solid rgba(0,212,255,0.3);animation:fu .6s ease}
.hbdot{width:6px;height:6px;border-radius:50%;background:var(--a);box-shadow:0 0 8px var(--a);animation:pu 2s infinite}
.hbt{color:var(--a);font-size:11px;font-weight:700;letter-spacing:.07em}
.h1{font-family:'Syne',sans-serif;font-size:clamp(2rem,4.4vw,4rem);font-weight:800;line-height:1.14;letter-spacing:-.018em;margin-bottom:18px;color:var(--t);animation:fu .7s .1s ease both;word-break:keep-all;max-width:980px;margin-left:auto;margin-right:auto}
.h1 .ac{display:block;margin-top:.22em;font-size:.86em;line-height:1.08;background:linear-gradient(135deg,var(--a),#4488ff,#aa44ff);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.hsub{font-size:clamp(14px,1.35vw,20px);color:var(--s);max-width:760px;margin:0 auto 34px;line-height:1.65;animation:fu .7s .2s ease both;word-break:keep-all}
.hact{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;animation:fu .7s .3s ease both;margin-bottom:64px}
.hstats{display:flex;background:rgba(255,255,255,0.03);border:1px solid var(--b);border-radius:14px;overflow:hidden;animation:fu .7s .4s ease both;max-width:1020px;margin:0 auto}
.hstat{padding:18px 32px;border-right:1px solid var(--b);flex:1;min-width:0}
.hstat:last-child{border-right:none}
.sn{font-family:'JetBrains Mono',monospace;font-size:clamp(1.1rem,2.3vw,1.55rem);font-weight:700;color:var(--a);letter-spacing:-.03em;font-feature-settings:'tnum' 1}
.sn.sfmt{font-family:'DM Sans',sans-serif;font-size:clamp(1rem,1.55vw,1.25rem);font-weight:700;letter-spacing:0}
.sl{font-size:12px;color:var(--m);margin-top:4px;font-family:'DM Sans',sans-serif}
/* steps */
.steps{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:1.5px;background:var(--b);border-radius:14px;overflow:hidden}
.step{background:var(--s1);padding:2rem 1.6rem;transition:background .3s}
.step:hover{background:var(--s2)}
.step-num{font-family:'Syne',sans-serif;font-size:42px;font-weight:800;color:rgba(0,212,255,0.1);line-height:1;margin-bottom:14px;letter-spacing:-.04em}
.step-ico{width:46px;height:46px;border-radius:12px;display:flex;align-items:center;justify-content:center;margin-bottom:14px;font-size:20px}
.step-t{font-family:'Syne',sans-serif;font-size:15px;font-weight:700;color:var(--t);margin-bottom:7px}
.step-d{font-size:13px;color:var(--m);line-height:1.7}
/* sample grid */
.sgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(210px,1fr));gap:.9rem}
.scard{border-radius:14px;overflow:hidden;border:1px solid var(--b);cursor:pointer;transition:all .3s;background:var(--s1)}
.scard:hover{border-color:rgba(0,212,255,0.4);transform:translateY(-5px);box-shadow:0 12px 36px rgba(0,212,255,0.1)}
.scw{height:170px;position:relative;background:var(--bg)}
.scb{padding:.9rem}
.scn{font-family:'Syne',sans-serif;font-size:13px;font-weight:700;color:var(--t);margin-bottom:2px}
.scm{font-size:11px;color:var(--m)}
.scov{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;background:rgba(8,12,20,0.6);opacity:0;transition:opacity .2s;backdrop-filter:blur(4px)}
.scard:hover .scov{opacity:1}
/* ══ UPLOAD ══ */
.up-page{min-height:100vh;padding:5.5rem 2rem 3rem;display:flex;flex-direction:column;align-items:stretch}
.up-hdr{text-align:center;margin-bottom:2.5rem}
.up-title{font-family:'Syne',sans-serif;font-size:clamp(1.7rem,4vw,2.6rem);font-weight:800;letter-spacing:-.02em;color:var(--t);margin-bottom:8px}
.up-sub{font-size:14px;color:var(--s)}
/* mode tabs */
.mtabs{display:flex;background:var(--s2);border:1px solid var(--b);border-radius:10px;padding:3px;gap:3px;margin-bottom:1.25rem}
.mtab{flex:1;padding:9px;border:none;border-radius:7px;background:transparent;color:var(--m);font-size:13px;font-weight:500;display:flex;align-items:center;justify-content:center;gap:6px;transition:all .2s}
.mtab.on{background:var(--s3);color:var(--t);border:1px solid var(--b)}
.mtab:hover:not(.on){color:var(--t)}
/* dropzone */
.dz{position:relative;border:2px dashed rgba(0,212,255,0.22);border-radius:18px;padding:3.5rem 2rem;text-align:center;background:rgba(0,212,255,0.018);transition:all .3s;cursor:pointer;overflow:hidden}
.dz:hover,.dz.ov{border-color:rgba(0,212,255,0.6);background:rgba(0,212,255,0.045)}
.dz.ov{animation:bg 1s ease infinite}
.dz-icon{width:68px;height:68px;border-radius:18px;background:rgba(0,212,255,0.08);border:1px solid rgba(0,212,255,0.2);display:flex;align-items:center;justify-content:center;margin:0 auto 18px}
.dz-t{font-family:'Syne',sans-serif;font-size:17px;font-weight:700;color:var(--t);margin-bottom:7px}
.dz-s{font-size:13px;color:var(--m);margin-bottom:20px}
.fmts{display:flex;gap:7px;justify-content:center;flex-wrap:wrap}
.fmt{padding:3px 10px;border-radius:999px;background:rgba(255,255,255,0.04);border:1px solid var(--b);color:var(--m);font-size:10px;font-weight:600}
.dsh{position:absolute;top:0;left:-100%;width:50%;height:100%;background:linear-gradient(90deg,transparent,rgba(0,212,255,0.05),transparent);animation:sh 3s ease-in-out infinite;pointer-events:none}
.dz.has-file{padding:0;min-height:440px;border-style:solid;background:#050912;display:flex;align-items:center;justify-content:center}
.dz-preview-img{width:100%;height:100%;max-height:560px;object-fit:contain;display:block}
.dz-file-badge{position:absolute;left:18px;bottom:18px;right:18px;display:flex;align-items:center;justify-content:space-between;gap:.75rem;padding:.7rem .85rem;border-radius:14px;background:rgba(5,9,18,.76);border:1px solid rgba(255,255,255,.1);backdrop-filter:blur(10px)}
.dz-file-name{min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:var(--t);font-size:12px;font-weight:800}
.upload-file-actions{display:flex;align-items:center;justify-content:space-between;gap:.8rem;flex-wrap:wrap;margin-top:.85rem}
.upload-file-meta{font-size:12px;color:var(--s)}
input[type=file]{display:none}
.upload-shell{display:grid;grid-template-columns:minmax(0,1fr) 320px;gap:1.2rem;align-items:start}
.upload-main{min-width:0}
.demo-examples{position:sticky;top:76px;min-width:0}
.demo-examples-head{display:flex;align-items:center;justify-content:space-between;gap:.8rem;margin-bottom:.75rem}
.demo-examples-title{display:flex;align-items:center;gap:.5rem;font-family:'Syne',sans-serif;font-size:15px;font-weight:850;color:var(--t)}
.demo-examples-title span{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--a);padding:.14rem .42rem;border-radius:999px;border:1px solid rgba(0,212,255,.25);background:rgba(0,212,255,.08)}
.demo-examples-count{font-size:11px;color:var(--m);font-weight:800}
.demo-example-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:.65rem;max-height:calc(100vh - 142px);overflow-y:auto;padding-right:.18rem}
.demo-example{position:relative;aspect-ratio:1;border-radius:11px;border:1px solid var(--bb);background:#050912;overflow:hidden;transition:all .18s}
.demo-example:hover{border-color:rgba(0,212,255,.52);transform:translateY(-1px);box-shadow:0 10px 28px rgba(0,212,255,.08)}
.demo-example.on{border-color:rgba(0,212,255,.9);box-shadow:0 0 0 1px rgba(0,212,255,.28)}
.demo-example img{width:100%;height:100%;object-fit:contain;display:block;padding:.35rem}
.demo-example-badge{position:absolute;left:.42rem;bottom:.42rem;right:.42rem;padding:.28rem .38rem;border-radius:7px;background:rgba(5,9,18,.72);border:1px solid rgba(255,255,255,.08);font-size:9px;color:var(--s);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;text-align:center;opacity:0;transition:opacity .18s}
.demo-example:hover .demo-example-badge,.demo-example.on .demo-example-badge{opacity:1}
.demo-example-empty{padding:1rem;border:1px solid var(--b);border-radius:12px;background:var(--s1);font-size:12px;color:var(--m);line-height:1.65}
/* preview */
.pgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(110px,1fr));gap:.65rem}
.pitem{position:relative;border-radius:10px;overflow:hidden;border:1px solid var(--b);aspect-ratio:1;background:var(--s2)}
.pitem img{width:100%;height:100%;object-fit:cover;display:block}
.prm{position:absolute;top:4px;right:4px;width:20px;height:20px;border-radius:50%;background:rgba(8,12,20,0.88);border:1px solid rgba(255,255,255,0.12);display:flex;align-items:center;justify-content:center;color:var(--m);font-size:10px;transition:all .2s}
.prm:hover{background:rgba(239,68,68,0.82);color:#fff}
.plbl{position:absolute;bottom:0;left:0;right:0;padding:3px 5px;background:rgba(8,12,20,0.82);font-size:9px;color:var(--m);text-align:center;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
/* submit */
.sub-area{margin-top:1.5rem;padding-top:1.25rem;border-top:1px solid var(--b);display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.sub-note{font-size:12px;color:var(--m);flex:1}
.sub-note strong{color:var(--t)}
.api-banner{margin-top:1rem;padding:.9rem 1rem;border-radius:10px;border:1px solid var(--b);font-size:12px;line-height:1.55}
.api-banner.ok{background:rgba(34,197,94,0.08);border-color:rgba(34,197,94,0.28);color:#9ee6b7}
.api-banner.err{background:rgba(239,68,68,0.1);border-color:rgba(239,68,68,0.28);color:#ffb6b6}
.ux-actions{display:flex;align-items:center;gap:.5rem;flex-wrap:wrap;margin-top:.55rem}
.recent-card{margin-top:1rem;padding:1rem;border-radius:12px;background:var(--s1);border:1px solid var(--b)}
.recent-list{display:flex;flex-direction:column;gap:.55rem;margin-top:.6rem}
.recent-item{display:flex;align-items:center;justify-content:space-between;gap:.8rem;padding:.6rem .7rem;border-radius:10px;background:rgba(255,255,255,.03);border:1px solid var(--b)}
.recent-main{min-width:0}
.recent-id{font-size:11px;font-family:'JetBrains Mono',monospace;color:var(--t);font-weight:700}
.recent-meta{font-size:11px;color:var(--m);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.recent-actions{display:flex;align-items:center;gap:.35rem}
.icon-btn{width:26px;height:26px;border-radius:7px;border:1px solid var(--b);background:rgba(255,255,255,.03);color:var(--m);display:flex;align-items:center;justify-content:center}
.icon-btn:hover{border-color:rgba(0,212,255,.42);color:var(--a)}
/* tips */
.tips{display:grid;grid-template-columns:repeat(auto-fit,minmax(170px,1fr));gap:.65rem;margin-top:2rem}
.tip{padding:.9rem;border-radius:10px;background:var(--s1);border:1px solid var(--b)}
.tip-ic{font-size:18px;margin-bottom:7px}
.tip-t{font-size:12px;font-weight:600;color:var(--t);margin-bottom:3px}
.tip-d{font-size:11px;color:var(--m);line-height:1.6}
/* object selection */
.seg-page{min-height:100vh;padding:5.5rem 2rem 3rem}
.seg-layout{display:block}
.seg-source,.seg-panel{background:var(--s1);border:1px solid var(--b);border-radius:16px;overflow:hidden}
.seg-source{position:sticky;top:74px}
.seg-source-img{width:100%;aspect-ratio:4/3;background:var(--bg);object-fit:contain;display:block}
.seg-source-body{padding:1rem}
.seg-loading-card{width:min(720px,100%);margin:0 auto;padding:2rem;border-radius:18px;background:var(--s1);border:1px solid var(--b);text-align:center}
.seg-loading-card .pspin{margin-bottom:1.2rem}
.seg-loading-title{font-family:'Syne',sans-serif;font-size:22px;font-weight:850;color:var(--t);margin-bottom:.5rem}
.seg-loading-desc{font-size:13px;color:var(--s);line-height:1.75}
.seg-map-work{display:grid;grid-template-columns:minmax(420px,1fr) minmax(280px,.7fr);gap:1rem;padding:1rem;border-bottom:1px solid var(--b)}
.seg-map-stage{position:relative;border:1px solid var(--b);border-radius:14px;background:#050912;overflow:hidden}
.seg-map-canvas{position:relative;width:100%;cursor:pointer;user-select:none}
.seg-map-canvas img.seg-map-img{width:100%;height:auto;display:block}
.seg-mask-layer{position:absolute;inset:0;width:100%;height:100%;object-fit:contain;opacity:.12;mix-blend-mode:screen;pointer-events:none;transition:opacity .14s ease,filter .14s ease,transform .14s ease}
.seg-mask-layer.is-hover{opacity:.82;filter:drop-shadow(0 0 14px rgba(0,212,255,.8));transform:scale(1.012)}
.seg-mask-layer.is-selected{opacity:.58;filter:drop-shadow(0 0 18px rgba(0,212,255,.65))}
.seg-map-cursor{position:absolute;z-index:5;min-width:170px;max-width:220px;padding:.65rem;border-radius:12px;border:1px solid rgba(0,212,255,.42);background:rgba(8,12,20,.9);box-shadow:0 14px 34px rgba(0,0,0,.35);backdrop-filter:blur(10px);pointer-events:none;display:none}
.seg-map-cursor img{width:100%;aspect-ratio:1.2;object-fit:contain;background:#050912;border-radius:8px;margin-bottom:.45rem}
.seg-map-cursor .seg-name{font-size:12px}
.seg-map-cursor .seg-meta{font-size:10px}
.seg-map-hint{padding:.75rem 1rem;border-top:1px solid var(--b);font-size:11px;color:var(--m);line-height:1.65}
.seg-picked{display:flex;flex-direction:column;gap:.75rem}
.seg-picked-preview{position:relative;border:1px solid var(--b);border-radius:13px;background:#050912;min-height:250px;display:flex;align-items:center;justify-content:center;overflow:hidden}
.seg-picked-preview.is-ready{border-color:rgba(0,212,255,.36);background-color:#050912;background-image:linear-gradient(45deg,rgba(255,255,255,.055) 25%,transparent 25%),linear-gradient(-45deg,rgba(255,255,255,.055) 25%,transparent 25%),linear-gradient(45deg,transparent 75%,rgba(255,255,255,.055) 75%),linear-gradient(-45deg,transparent 75%,rgba(255,255,255,.055) 75%);background-size:20px 20px;background-position:0 0,0 10px,10px -10px,-10px 0}
.seg-picked-preview img{width:100%;height:100%;object-fit:contain;display:block}
.seg-picked-note{font-size:12px;color:var(--m);line-height:1.7}

.seg-card-body{padding:.75rem}

.seg-empty{padding:2rem;text-align:center;color:var(--m);font-size:13px}

.seg-manual{display:flex;flex-direction:column;gap:.75rem;justify-content:space-between}
.seg-manual-title{font-size:12px;font-weight:750;color:var(--t)}
.seg-manual-actions{display:flex;gap:.5rem;flex-wrap:wrap}
.seg-point-tools{display:flex;align-items:center;justify-content:space-between;gap:.65rem;padding:.75rem 1rem;border-bottom:1px solid var(--b);background:rgba(255,255,255,.025)}
.seg-point-toggle{display:flex;gap:3px;padding:3px;border:1px solid var(--b);border-radius:12px;background:#050912}
.seg-point-toggle button{border:0;border-radius:9px;background:transparent;color:var(--m);font-size:11px;font-weight:800;padding:.48rem .68rem;cursor:pointer}

.seg-counts{display:inline-flex;align-items:center;gap:.35rem;margin-left:.55rem}

.seg-ai-card{padding:1rem;border-bottom:1px solid var(--b);background:linear-gradient(135deg,rgba(0,212,255,.07),rgba(0,102,255,.035))}

.seg-text-input{width:100%;border:1px solid rgba(0,212,255,.22);border-radius:11px;background:#050912;color:var(--t);padding:.82rem .95rem;font-size:15px;font-weight:750;outline:none}

.upload-prompt-card{margin-top:1.1rem;padding:1rem;border:1px solid rgba(0,212,255,.18);border-radius:18px;background:linear-gradient(135deg,rgba(0,212,255,.08),rgba(0,102,255,.035));box-shadow:inset 0 1px 0 rgba(255,255,255,.04)}

.proc-page{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:6rem 2rem;position:relative;overflow:hidden}

.pstep.done{border-color:rgba(34,197,94,0.3);background:rgba(34,197,94,0.04)}

.pstep.act .psico{background:rgba(0,212,255,0.1);color:var(--a)}

.psinfo{flex:1;min-width:0}
.psn{font-size:13px;font-weight:600;color:var(--t)}
.psd{font-size:11px;color:var(--m);margin-top:1px}

.ppwrap{margin-bottom:1.75rem}
.ppl{display:flex;justify-content:space-between;margin-bottom:7px}
.ppt{font-size:12px;color:var(--s)}

.ppbar{height:5px;border-radius:999px;background:rgba(255,255,255,0.06);overflow:hidden}

.pfrow{display:flex;gap:.45rem;overflow-x:auto;padding-bottom:.2rem}
.pft{flex-shrink:0;width:46px;height:46px;border-radius:7px;background:var(--s2);border:1px solid var(--b);overflow:hidden}

.itl{position:absolute;bottom:0;left:0;right:0;padding:3px 5px;background:rgba(8,12,20,0.82);font-size:9px;color:var(--m);text-align:center;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

.result-model,.result-thumb{width:100%;height:100%;display:block;border:0;background:#404040}

.mesh-compare{position:absolute;inset:0;width:100%;height:100%;display:grid;grid-template-columns:minmax(0,1fr) minmax(0,1fr);gap:1px;background:rgba(255,255,255,.08);overflow:hidden}
.mesh-full{position:absolute;inset:0;width:100%;height:100%;background:radial-gradient(circle at 50% 42%,#343840,#14181e 72%);overflow:hidden}

.mesh-pane{position:relative;min-width:0;min-height:0;background:#303030;overflow:hidden}

.mesh-stats-float{position:absolute;top:52px;left:16px;z-index:3;width:min(300px,calc(100% - 32px));display:flex;flex-direction:column;gap:12px;pointer-events:none}
.mesh-stats-card,.mesh-export-card{border-radius:14px;background:linear-gradient(135deg,rgba(0,0,0,.46),rgba(0,0,0,.28));border:1px solid rgba(255,255,255,.08);box-shadow:0 14px 34px rgba(0,0,0,.16);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px)}

.cotl{position:absolute;top:10px;left:10px;display:flex;flex-direction:column;gap:5px;pointer-events:none}
.cotr{position:absolute;top:10px;right:10px;display:flex;flex-direction:column;gap:5px;pointer-events:none}
.htag{padding:3px 9px;border-radius:999px;background:rgba(8,12,20,0.88);border:1px solid var(--b);font-size:10px;color:var(--m);backdrop-filter:blur(8px);font-family:'JetBrains Mono',monospace;letter-spacing:.02em}

.asset-insight{display:flex;flex-direction:column;gap:.5rem}

.tsep{width:1px;height:18px;background:var(--b);margin:0 5px}

<script>
/* ══════════════ STATE ══════════════ */
const S={
  page:'landing',
  mode:'image',
  files:[],
  proc:{pct:0,si:0,label:'대기 중',desc:'업로드를 시작하면 처리 상태를 표시합니다.',failed:false},
  viewer:{vm:'single',ar:false,hs:false,ahs:null,tab:'result',sceneTab:'viewer',ob:true,sb:true,mat:null},
  scrolled:false,
  ath:0,
  sid:'',
  modal:null,
  busy:false,
  err:null,
  info:null,
  pendingUpload:null,
  imagePrompt:'',
  seg:{loading:false,error:null,inputUrl:'',selectedId:null,candidates:[],map:{hoverId:null,loading:false,error:null},enhance:{loading:false,error:null,candidateId:null},text:{prompt:'',loading:false,error:null,confidenceThreshold:0.5,mergeMode:'best'},prompt:{points:[],box:null,labelType:'positive',loading:false,error:null,drag:null,imageSize:null}},
  job:null,
  result:null,
  exports:{loading:false,error:null,items:null,busyFormat:null,downloadProgress:null,selectedFormat:'glb'},
  demoExamples:{loading:false,error:null,items:null},
  pollingTimer:null,
  pollFailures:0,
  resultFailures:0,
  recent:[]
};

const SESSION_KEY='ai3d_prism_session_v2';
const RECENT_KEY='ai3d_prism_recent_jobs_v2';
const VIEWER_ASSET_VERSION='viewer-object-primary-20260519';
let SEG_PROMPT_PREVIEW_TIMER=null;
let SEG_PROMPT_REQUEST_SEQ=0;
let SEG_LOADING_TIMER=null;
let SEG_MAP_HOVER_FRAME=null;
let SEG_MAP_PENDING_EVENT=null;
let SEG_MAP_LAST_HOVER_ID=null;
let SEG_MAP_LAST_SELECTED_ID=null;
let SEG_MAP_LAST_CURSOR_ID=null;
let SEG_PROMPT_DRAG_FRAME=null;
let SEG_PROMPT_PENDING_BOX=null;
const SEG_MAP_LAYER_CACHE=new Map();
let EXPORT_PROGRESS_TIMER=null;
const VIEWER_TEXTURE_CACHE=new Map();
let VIEWER_TEXTURE_APPLY_KEY='';

const DEFAULT_API_BASE_URL=(()=>{
  if(window.location.protocol==='file:')return 'http://127.0.0.1:8000';
  const port=window.location.port;
  if(port&&port!=='8000')return `${window.location.protocol}//${window.location.hostname}:8000`;
  return '';
})();
const API_BASE_URL=(window.__AI3D_API_BASE_URL||DEFAULT_API_BASE_URL).trim();
let modelViewerRequested=false;
function buildUrl(path){
  if(!path)return '';
  if(path.startsWith('http://')||path.startsWith('https://'))return path;
  if(!API_BASE_URL)return path;
  return new URL(path,API_BASE_URL).toString();
}
function versionedViewerUrl(path){
  const built=buildUrl(path);
  if(!built)return '';
  const token=[
    VIEWER_ASSET_VERSION,
    S.sid||'',
    S.job?.updated_at||S.job?.completed_at||S.job?.created_at||'',
    S.result?.stage||S.result?.quality_status||''
  ].filter(Boolean).join('|');
  return `${built}${built.includes('?')?'&':'?'}viewer_v=${encodeURIComponent(token)}`;
}
function ensureModelViewerLoaded(){
  if(window.customElements?.get('model-viewer')||modelViewerRequested)return;
  modelViewerRequested=true;
  const script=document.createElement('script');
  script.type='module';
  script.src='https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js';
  script.async=true;
  document.head.appendChild(script);
}
async function req(path,opt={}){
  const {timeoutMs=0,...fetchOptions}=opt||{};
  let timer=null;
  const controller=timeoutMs>0?new AbortController():null;
  if(controller){
    timer=setTimeout(()=>controller.abort(),timeoutMs);
    fetchOptions.signal=controller.signal;
  }
  let res;
  try{
    res=await fetch(buildUrl(path),fetchOptions);
  }catch(err){
    if(err?.name==='AbortError')throw new Error('요청 시간이 초과되었습니다.');
    throw err;
  }finally{
    if(timer)clearTimeout(timer);
  }
  const ctype=res.headers.get('content-type')||'';
  const raw=await res.text();
  let payload=raw;
  if(raw&&ctype.includes('application/json')){
    try{payload=JSON.parse(raw);}catch{payload=raw;}
  }
  if(!res.ok){
    let detail=`${res.status} ${res.statusText}`;
    if(payload&&typeof payload==='object')detail=payload.detail||JSON.stringify(payload);
    else if(raw)detail=raw;
    throw new Error(detail||'Request failed');
  }
  return payload;
}
async function apiUpload(type,file){
  const form=new FormData();
  form.append('type',type);
  form.append('file',file);
  return req('/api/upload',{method:'POST',body:form});
}
async function apiCreateJob(jobId,type,options={}){
  return req('/api/jobs',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({job_id:jobId,type,options})
  });
}
async function apiGetJob(jobId){return req(`/api/jobs/${jobId}`)}
function normalizeResultPayload(payload){
  if(payload?.mesh_url)payload.mesh_url=buildUrl(payload.mesh_url);
  if(payload?.thumbnail_url)payload.thumbnail_url=buildUrl(payload.thumbnail_url);
  if(payload?.metadata_url)payload.metadata_url=buildUrl(payload.metadata_url);
  if(payload?.material_url)payload.material_url=buildUrl(payload.material_url);
  if(payload?.asset_metadata_url)payload.asset_metadata_url=buildUrl(payload.asset_metadata_url);
  if(payload?.job?.result){
    if(payload.job.result.mesh_url)payload.job.result.mesh_url=buildUrl(payload.job.result.mesh_url);
    if(payload.job.result.thumbnail_url)payload.job.result.thumbnail_url=buildUrl(payload.job.result.thumbnail_url);
    if(payload.job.result.metadata_url)payload.job.result.metadata_url=buildUrl(payload.job.result.metadata_url);
    if(payload.job.result.material_url)payload.job.result.material_url=buildUrl(payload.job.result.material_url);
    if(payload.job.result.asset_metadata_url)payload.job.result.asset_metadata_url=buildUrl(payload.job.result.asset_metadata_url);
  }
  return payload;
}
async function apiGetResult(jobId){
  const result=normalizeResultPayload(await req(`/api/jobs/${jobId}/result`,{timeoutMs:20000}));
  result.hydrated=true;
  return result;
}
function viewerResultFromJob(job){
  const r=job?.result||{};
  return normalizeResultPayload({
    job_id:job?.job_id||S.sid,
    type:job?.type||'image_to_3d',
    viewer_type:r.viewer_type||'object_viewer',
    mesh_url:r.mesh_url||'',
    thumbnail_url:r.thumbnail_url||'',
    metadata_url:r.metadata_url||'',
    material_url:r.material_url||'',
    asset_metadata_url:r.asset_metadata_url||'',
    stage:job?.stage||'object_mesh_completed',
    reason:job?.reason||null,
    quality_status:job?.quality_status||job?.quality?.status||null,
    quality:job?.quality||{},
    job:job||null,
    metadata:{},
    material:null,
    asset_metadata:null,
    hydrated:false
  });
}
function hasViewerAsset(result){
  return Boolean(result?.mesh_url||result?.thumbnail_url||result?.job?.result?.mesh_url);
}
function normalizeExportPayload(payload){
  const normalizeItem=(item)=>item?{...item,url:buildUrl(item.url||'')}:item;
  if(Array.isArray(payload?.exports)){
    payload.exports=payload.exports.map(normalizeItem);
  }
  if(payload?.url)payload=normalizeItem(payload);
  return payload;
}
async function apiListExports(jobId){
  return normalizeExportPayload(await req(`/api/jobs/${jobId}/exports`));
}
async function apiCreateExport(jobId,format){
  return normalizeExportPayload(await req(`/api/jobs/${jobId}/exports/${encodeURIComponent(format)}`,{method:'POST'}));
}
function normalizeSegPayload(payload){
  const cacheToken=Date.now().toString(36);
  const bust=(url)=>{
    const built=buildUrl(url);
    if(!built)return built;
    return `${built}${built.includes('?')?'&':'?'}v=${cacheToken}`;
  };
  if(payload?.input_url)payload.input_url=buildUrl(payload.input_url);
  if(Array.isArray(payload?.candidates)){
    payload.candidates=payload.candidates.map((candidate)=>({
      ...candidate,
      segmented_url:bust(candidate.segmented_url),
      segmented_preview_url:bust(candidate.segmented_preview_url),
      mask_url:bust(candidate.mask_url),
      overlay_url:bust(candidate.overlay_url)
    }));
  }
  return payload;
}
async function apiCreateSegPrompt(jobId,prompt){
  const payload=await req(`/api/jobs/${jobId}/segmentation-prompt`,{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify(prompt)
  });
  return normalizeSegPayload(payload);
}
async function apiCreateSegTextPrompt(jobId,prompt){
  const payload=await req(`/api/jobs/${jobId}/segmentation-text-prompt`,{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify(prompt)
  });
  return normalizeSegPayload(payload);
}
async function apiEnhanceSegCandidate(jobId,candidateId){

function candidateBBoxMetrics(candidate){
  if(!Array.isArray(candidate?.bbox)||candidate.bbox.length!==4)return {bboxAreaRatio:0,fillRatio:1};
  const [_x1,_y1,w,h]=candidate.bbox.map(Number);
  const bboxArea=Math.max(0,w)*Math.max(0,h);
  const imageWidth=Number(S.seg.map?.imageSize?.width||0);
  const imageHeight=Number(S.seg.map?.imageSize?.height||0);
  const imageArea=Math.max(1,imageWidth*imageHeight);
  const bboxAreaRatio=imageArea?bboxArea/imageArea:0;
  const areaRatio=Math.max(0,Number(candidate?.area_ratio||0));
  const fillRatio=bboxAreaRatio>0?Math.min(1.2,areaRatio/Math.max(1e-8,bboxAreaRatio)):1;
  return {bboxAreaRatio,fillRatio};
}

function candidateSelectPriority(candidate){
  const area=Math.max(0,Number(candidate?.area_ratio||0));
  const score=Number(candidate?.score||0);
  const stability=Number(candidate?.stability_score||0);
  const predictedIoU=Number(candidate?.predicted_iou||0);
  const border=Number(candidate?.border_touch_count||0);
  const {bboxAreaRatio,fillRatio}=candidateBBoxMetrics(candidate);

  let areaBias=-3.2;
  if(area>=0.03&&area<0.06)areaBias=-1.1+(area*6.0);
  else if(area>=0.06&&area<=0.55)areaBias=1.65+Math.min(2.3,area*4.9);
  else if(area>0.55&&area<=0.78)areaBias=1.95-((area-0.55)*4.5);
  else if(area>0.78&&area<=0.9)areaBias=-1.2-((area-0.78)*8.0);

  const fillBonus=fillRatio<0.1?-0.95:fillRatio<0.22?-0.35:Math.min(0.45,(fillRatio-0.22)*0.55);
  const coveragePenalty=bboxAreaRatio>0.92?-1.1:0.0;

  return (
    areaBias
    +(score*1.15)
    +(stability*0.35)
    +(predictedIoU*0.2)
    +fillBonus
    +coveragePenalty
    -(border*0.38)
  );
}

function sortSegHitCandidates(candidates){
  const meaningfulAreaThreshold=0.08;
  return [...(candidates||[])].sort((a,b)=>{
    const aMeaningful=Number(a?.area_ratio||0)>=meaningfulAreaThreshold?1:0;
    const bMeaningful=Number(b?.area_ratio||0)>=meaningfulAreaThreshold?1:0;
    if(aMeaningful!==bMeaningful)return bMeaningful-aMeaningful;
    return candidateSelectPriority(b)-candidateSelectPriority(a);
  });
}

const PHI=(1+Math.sqrt(5))/2;
const RV=[[-1,PHI,0],[1,PHI,0],[-1,-PHI,0],[1,-PHI,0],[0,-1,PHI],[0,1,PHI],[0,-1,-PHI],[0,1,-PHI],[PHI,0,-1],[PHI,0,1],[-PHI,0,-1],[-PHI,0,1]];
const VT=RV.map(([x,y,z])=>{const l=Math.sqrt(x*x+y*y+z*z);return[x/l,y/l,z/l]});
const FC=[[0,11,5],[0,5,1],[0,1,7],[0,7,10],[0,10,11],[1,5,9],[5,11,4],[11,10,2],[10,7,6],[7,1,8],[3,9,4],[3,4,2],[3,2,6],[3,6,8],[3,8,9],[4,9,5],[2,4,11],[6,2,10],[8,6,7],[9,8,1]];
const ry=([x,y,z],a)=>[x*Math.cos(a)-z*Math.sin(a),y,x*Math.sin(a)+z*Math.cos(a)];
const rx=([x,y,z],a)=>[x,y*Math.cos(a)-z*Math.sin(a),y*Math.sin(a)+z*Math.cos(a)];
const rgba=(h,a)=>{const r=parseInt(h.slice(1,3),16),g=parseInt(h.slice(3,5),16),b=parseInt(h.slice(5,7),16);return`rgba(${r},${g},${b},${a})`};
const VW={};
function startV(id,{ar=true,col='#00d4ff',mini=false}={}){
  const c=document.getElementById(id);if(!c)return;
  if(VW[id]){cancelAnimationFrame(VW[id].r);if(VW[id].ro)VW[id].ro.disconnect()}
  const st={a:{y:.5,x:.2},drag:false,last:{},sc:0,col,ar};VW[id]=st;
  const rsz=()=>{c.width=c.offsetWidth*devicePixelRatio;c.height=c.offsetHeight*devicePixelRatio};
  rsz();const ro=new ResizeObserver(rsz);ro.observe(c);st.ro=ro;

    if(!document.getElementById(id)){cancelAnimationFrame(st.r);ro.disconnect();return}
    const W=c.width,H=c.height,dpr=devicePixelRatio||1;
    if(W<2||H<2){st.r=requestAnimationFrame(draw);return}
    ctx.clearRect(0,0,W,H);ctx.fillStyle='#080c14';ctx.fillRect(0,0,W,H);
    const g=ctx.createRadialGradient(W*.5,H*.5,0,W*.5,H*.5,W*.44);

    }

    const sorted=FC.map(f=>({f,z:(proj[f[0]][2]+proj[f[1]][2]+proj[f[2]][2])/3})).sort((a,b)=>a.z-b.z);
    for(const{f,z:dep}of sorted){

    st.sc=(st.sc+1.8)%H;
    const sg=ctx.createLinearGradient(0,st.sc-22*dpr,0,st.sc+22*dpr);
    sg.addColorStop(0,'transparent');sg.addColorStop(.5,rgba(col,.11));sg.addColorStop(1,'transparent');
    ctx.fillStyle=sg;ctx.fillRect(0,st.sc-22*dpr,W,44*dpr);
    if(!mini){
      ctx.font=`${8.5*dpr}px 'JetBrains Mono',monospace`;ctx.fillStyle=rgba(col,.6);
      ctx.fillText('● LIVE SCAN',12*dpr,18*dpr);
      ctx.fillText(`${((((ay*180/Math.PI)%360)+360)%360).toFixed(1)}°`,12*dpr,30*dpr);
      ctx.fillText('4.2M POLY',W-78*dpr,18*dpr);ctx.fillText('32K UV',W-78*dpr,30*dpr);

      ctx.beginPath();ctx.moveTo(W-br-bs,br);ctx.lineTo(W-br,br);ctx.lineTo(W-br,br+bs);ctx.stroke();
      ctx.beginPath();ctx.moveTo(br,H-br-bs);ctx.lineTo(br,H-br);ctx.lineTo(br+bs,H-br);ctx.stroke();
      ctx.beginPath();ctx.moveTo(W-br-bs,H-br);ctx.lineTo(W-br,H-br);ctx.lineTo(W-br,H-br-bs);ctx.stroke();
    }
    if(st.ar)st.a.y+=.009;
    st.r=requestAnimationFrame(draw);
  };

  c.ontouchstart=e=>{st.drag=true;st.last={x:e.touches[0].clientX,y:e.touches[0].clientY};e.preventDefault()};
  c.ontouchmove=e=>{if(!st.drag)return;st.a.y+=(e.touches[0].clientX-st.last.x)*.012;st.a.x+=(e.touches[0].clientY-st.last.y)*.012;st.last={x:e.touches[0].clientX,y:e.touches[0].clientY};e.preventDefault()};
  c.ontouchend=()=>st.drag=false;
  st.r=requestAnimationFrame(draw);
}

function activeSteps(proc=S.proc){
  if(proc?.queued){
    const steps=IMG_STEPS.map((step)=>({...step}));
    steps[0]={l:'작업 대기열',s:'앞 작업이 끝나면 자동으로 시작합니다',i:'⏳'};
    return steps;
  }
  return IMG_STEPS;
}

function resolveProgress(job){
  if(!job){
    return{pct:0,si:0,label:'대기 중',desc:'파일 업로드 후 스캔을 시작하세요.',failed:false};
  }
  if(job.status==='queued')return{pct:18,si:0,label:'작업 대기열',desc:'앞 작업이 끝나면 워커가 자동으로 시작합니다.',failed:false,queued:true};
  if(job.status==='running'){
    if(job.type==='image_to_3d'){
      if(job.stage==='image_preprocess_running'||job.stage==='image_preprocess_completed')return{pct:32,si:1,label:'입력 준비',desc:'원본 이미지를 3D 생성 엔진 입력으로 준비합니다.',failed:false};
      if(job.stage==='multiview_prior_running')return{pct:52,si:2,label:'3D 생성',desc:'이미지 기반 3D 메시를 생성하고 있습니다.',failed:false};
      if(job.stage==='object_mesh_running'||job.stage==='object_mesh_completed')return{pct:68,si:2,label:'3D 생성',desc:'이미지 기반 3D 메시를 생성하고 있습니다.',failed:false};
      if(job.stage==='mesh_cleanup_running')return{pct:86,si:3,label:'메쉬 후처리',desc:'아티팩트를 정리하고 결과를 저장합니다.',failed:false};
      return{pct:70,si:2,label:'3D 생성',desc:'이미지 기반 3D 메시를 생성 중입니다.',failed:false};
    }
    return{pct:70,si:2,label:'3D 생성',desc:'이미지 기반 3D 메시를 생성 중입니다.',failed:false};
  }
  if(job.status==='failed'){
    return{pct:100,si:3,label:'처리 실패',desc:job.error||'처리 엔진이 실패했습니다.',failed:true};
  }
  if(job.status==='completed'){
    return{pct:97,si:5,label:'결과 로딩',desc:'최종 결과를 불러오는 중입니다.',failed:false};
  }
  return{pct:0,si:0,label:'대기 중',desc:'상태 정보를 기다리는 중입니다.',failed:false};
}

function renderPromptOverlay(){

  const dots=(prompt.points||[]).map((point,index)=>{
    const isAdd=Number(point.label??1)>0;
    return `<span class="seg-dot ${isAdd?'pos':'neg'}" title="${isAdd?'포함할 영역':'제거할 영역'} · 클릭하면 삭제" onclick="removeSegPromptPoint(event,${index})" onmousedown="event.stopPropagation()" onpointerdown="event.stopPropagation()" style="left:${(point.x/w)*100}%;top:${(point.y/h)*100}%">${isAdd?'+':'-'}</span>`;
  }).join('');
  const box=prompt.box;
  const drag=prompt.drag;
  const activeBox=box||drag?.box||null;
  const boxEl=activeBox?(()=>{
    const x1=Math.min(activeBox[0],activeBox[2]);
    const y1=Math.min(activeBox[1],activeBox[3]);
    const x2=Math.max(activeBox[0],activeBox[2]);

  })():'';
  return dots+boxEl;
}

function formatNum(value){
  const n=Number(value);
  return Number.isFinite(n)?n.toLocaleString('ko-KR'):'-';
}
function formatBytes(value){
  const n=Number(value);
  if(!Number.isFinite(n)||n<=0)return '-';
  const units=['B','KB','MB','GB'];
  let size=n;
  let unit=0;
  while(size>=1024&&unit<units.length-1){size/=1024;unit++;}
  return `${size.toFixed(size>=10||unit===0?0:1)} ${units[unit]}`;
}
function qualityPayload(result,meta,job){
  return result.quality||meta.quality||job.quality||{};
}
function qualityOk(quality,checks,names,fallback){
  const hasQuality=quality&&Object.keys(quality).length>0;
  if(!hasQuality)return fallback;
  return names.every((name)=>checks[name]!==false);
}
function qualitySummary(result,meta,job,meshUrl,thumbUrl){
  const quality=qualityPayload(result,meta,job);
  const checks=quality.checks||{};
  const metrics=quality.metrics||{};
  const status=String(result.quality_status||quality.status||job.quality_status||'').toLowerCase();
  const usable=quality.usable!==false&&(quality.usable===true||status==='passed'||!!meshUrl);
  const needsReview=!usable||status==='failed';
  const rows=[
    {
      title:'3D 파일',
      ok:qualityOk(quality,checks,['mesh_exists','mesh_non_empty','mesh_loadable'],!!meshUrl),
      desc:meshUrl?'모델 파일이 생성되어 브라우저에서 열립니다.':'아직 다운로드 가능한 3D 파일이 없습니다.'
    },
    {
      title:'형태 안정성',
      ok:qualityOk(quality,checks,['bbox_valid','component_count_ok','largest_component_ratio_ok'],usable),
      desc:qualityOk(quality,checks,['component_count_ok','largest_component_ratio_ok'],usable)?'큰 덩어리 하나로 잘 묶여 있어 사용하기 좋습니다.':'분리된 조각이나 비정상적인 형태가 있을 수 있습니다.'
    },
    {
      title:'디테일',
      ok:qualityOk(quality,checks,['vertex_count_ok'],usable),
      desc:metrics.vertex_count?`약 ${formatNum(metrics.vertex_count)}개 점으로 구성되어 있습니다.`:'기본 디테일 검사를 확인했습니다.'
    },
    {
      title:'미리보기',
      ok:qualityOk(quality,checks,['thumbnail_exists'],!!thumbUrl),
      desc:thumbUrl?'썸네일 이미지가 준비되어 결과를 빠르게 확인할 수 있습니다.':'썸네일 없이 3D 뷰어로만 확인할 수 있습니다.'
    }
  ];
  return{
    quality,
    checks,
    metrics,
    usable,
    needsReview,
    label:needsReview?'확인 필요':'사용 가능',
    headline:meshUrl?'3D 모델이 준비됐습니다':'결과 파일을 준비 중입니다',
    desc:meshUrl?'마우스로 모델을 돌려보고, 마음에 들면 3D 파일을 다운로드하세요.':'잠시 뒤 다시 조회하거나 새 스캔을 시작해 주세요.',
    rows
  };
}

function environmentPresets(material={}){

    .filter((preset)=>preset&&preset.id&&preset.viewerAvailable!==false)
    .map((preset)=>({

function materialTextureUrl(path){

async function cachedViewerTexture(model,url){

  }

function setTextureSlot(slot,texture){
  if(!slot||!texture)return false;
  try{
    if(typeof slot.setTexture==='function'){slot.setTexture(texture);return true;}
  }catch{}
  return false;
}
function clearTextureSlot(slot){
  if(!slot)return false;
  try{
    if(typeof slot.setTexture==='function'){slot.setTexture(null);return true;}
    if('texture' in slot){slot.texture=null;return true;}
  }catch{}
  return false;
}
function applyClayMeshMaterial(model){
  const materials=model?.model?.materials||[];
  if(!materials.length)return;
  for(const material of materials){
    const pbr=material.pbrMetallicRoughness;
    clearTextureSlot(pbr?.baseColorTexture);
    clearTextureSlot(pbr?.metallicRoughnessTexture);
    clearTextureSlot(material.normalTexture);
    clearTextureSlot(material.occlusionTexture);
    clearTextureSlot(material.emissiveTexture);
    if(pbr?.setBaseColorFactor)try{pbr.setBaseColorFactor([0.56,0.57,0.56,1])}catch{}
    if(pbr?.setRoughnessFactor)try{pbr.setRoughnessFactor(0.88)}catch{}
    if(pbr?.setMetallicFactor)try{pbr.setMetallicFactor(0)}catch{}
    if(material.setAlphaMode)try{material.setAlphaMode('OPAQUE')}catch{}
    setFirstAvailable(material,['setEmissiveFactor','emissiveFactor'],[0,0,0]);
  }
}
async function applyViewerPackageTextures(model,materialPackage,assetKey){
  if(!model?.model?.materials?.length||!model.createTexture)return;
  const baseUrl=materialTextureUrl(materialPackage.baseColorTexture);
  const normalUrl=materialPackage.normalSource==='glb_normalTexture'?materialTextureUrl(materialPackage.normalTexture):null;
  const applyKey=[assetKey,baseUrl,normalUrl].filter(Boolean).join('|');
  if(!baseUrl||VIEWER_TEXTURE_APPLY_KEY===applyKey)return;
  VIEWER_TEXTURE_APPLY_KEY=applyKey;
  const baseTexture=await cachedViewerTexture(model,baseUrl);
  const normalTexture=normalUrl?await cachedViewerTexture(model,normalUrl):null;
  for(const material of model.model.materials){
    const pbr=material.pbrMetallicRoughness;
    setTextureSlot(pbr?.baseColorTexture,baseTexture);
    setTextureSlot(material.normalTexture,normalTexture);
  }
}

  if(/ceratopsian|ceratops|frill|horned dinosaur|three horn/.test(haystack))return 'Ceratopsian';
  if(/\bhorn|horns|skull/.test(haystack))return 'Horned Dinosaur';

  if(String(assetMetadata.normalized_category_id||'')==='dinosaur')return /fossil|skeleton|skeletal|bone/.test(haystack)?'Dinosaur Fossil':'Unknown Dinosaur';

}
function currentViewerAssetKey(){
  const result=S.result||{};
  const job=S.job||{};
  return result.mesh_url||job?.result?.mesh_url||S.sid||'viewer_asset';
}
function normalizeHexColor(value,fallback='#ffffff'){
  const raw=String(value||'').trim();
  if(/^#[0-9a-f]{6}$/i.test(raw))return raw.toLowerCase();
  if(/^[0-9a-f]{6}$/i.test(raw))return `#${raw.toLowerCase()}`;
  return fallback;
}
function hexToRgbaFactor(hex,opacity){
  const clean=normalizeHexColor(hex).slice(1);
  const r=parseInt(clean.slice(0,2),16)/255;
  const g=parseInt(clean.slice(2,4),16)/255;
  const b=parseInt(clean.slice(4,6),16)/255;
  return [r,g,b,clamp(asFiniteNumber(opacity,1),0.05,1)];
}
function hexToRgbFactor(hex){
  const rgba=hexToRgbaFactor(hex,1);
  return rgba.slice(0,3);
}
function setFirstAvailable(target,names,value){
  if(!target)return false;
  for(const name of names){
    try{
      if(typeof target[name]==='function'){target[name](value);return true;}
      if(name in target){target[name]=value;return true;}
    }catch{}
  }
  return false;
}
function materialExtension(material,names){
  if(!material)return null;
  for(const name of names){
    try{
      const ext=material.getExtension?.(name)||material.extensions?.[name];
      if(ext)return ext;
    }catch{}
  }
  return null;
}
function applyOptionalShaderControls(material,controls){
  const transmission=clamp(asFiniteNumber(controls.transmission,0),0,1);
  const ior=clamp(asFiniteNumber(controls.ior,1.5),1,2.5);
  const sssWeight=clamp(asFiniteNumber(controls.sssWeight,0),0,1);
  const transmissionExt=materialExtension(material,['KHR_materials_transmission']);
  const iorExt=materialExtension(material,['KHR_materials_ior']);
  const volumeExt=materialExtension(material,['KHR_materials_volume']);
  const sssExt=materialExtension(material,['KHR_materials_subsurface','KHR_materials_diffuse_transmission']);
  setFirstAvailable(transmissionExt||material,['setTransmissionFactor','setTransmission','transmissionFactor','transmission'],transmission);
  setFirstAvailable(iorExt||material,['setIor','setIOR','setIorFactor','ior','iorFactor'],ior);
  setFirstAvailable(volumeExt,['setThicknessFactor','thicknessFactor'],transmission>0?0.02:0);
  setFirstAvailable(sssExt||material,['setSubsurfaceFactor','setSubsurfaceWeight','subsurfaceFactor','subsurfaceWeight'],sssWeight);
  setFirstAvailable(sssExt||material,['setSubsurfaceColorFactor','setSubsurfaceColor','subsurfaceColorFactor','subsurfaceColor'],hexToRgbFactor(controls.sssColor));
}
function updateMatControlLabels(key,value){
  document.querySelectorAll(`[data-mat-value="${key}"]`).forEach((node)=>{
    if(key==='environment')node.textContent=environmentLabel(currentViewerMaterial(),value);
    else if(key==='baseColor'||key==='sssColor'||key==='channelSolo'||key==='colorManagement')node.textContent=String(value);
    else if(key==='alphaCutout'||key==='displacementEnabled')node.textContent=value?'ON':'OFF';
    else node.textContent=numericLabel(key,value);
  });
  if(!['baseColor','sssColor','environment','channelSolo','colorManagement','alphaCutout','displacementEnabled'].includes(key)){
    const formatted=formatFloat(value);
    document.querySelectorAll(`[data-mat-input="${key}"]`).forEach((input)=>{
      if(String(input.value)!==formatted)input.value=formatted;
    });
  }
  if(key==='environment'){
    document.querySelectorAll('.env-option').forEach((button)=>{
      button.classList.toggle('on',button.getAttribute('data-env')===value);
    });
  }
  if(key==='baseColor'||key==='sssColor'){
    document.querySelectorAll(`[data-mat-input="${key}"]`).forEach((input)=>{
      if(input.value!==value)input.value=value;
    });
  }
}
function applyViewerMaterialControls(){
  const model=document.querySelector('model-viewer.result-model');
  if(!model)return;
  const sourceMaterial=currentViewerMaterial();
  const controls=ensureViewerMaterialControls(sourceMaterial,currentViewerAssetKey());
  const exposure=evToExposure(controls.exposureEV);
  model.setAttribute('exposure',exposure.toFixed(3));
  model.removeAttribute('shadow-intensity');
  model.setAttribute('environment-image',environmentViewerValue(sourceMaterial,controls.environment));
  model.setAttribute('orientation',`0deg ${formatFloat(controls.hdriRotation,1)}deg 0deg`);
  model.setAttribute('tone-mapping',toneMappingForColorManagement(controls.colorManagement));
  applyViewerPackageTextures(model,sourceMaterial,currentViewerAssetKey()).catch(()=>{});
  const materials=model.model?.materials||[];
  if(!materials.length)return;
  const baseColor=hexToRgbaFactor(controls.baseColor,1);
  for(const material of materials){
    const pbr=material.pbrMetallicRoughness;
    if(pbr?.setBaseColorFactor)try{pbr.setBaseColorFactor(baseColor)}catch{}
    if(pbr?.setRoughnessFactor)try{pbr.setRoughnessFactor(clamp(asFiniteNumber(controls.roughness,1),0,1))}catch{}
    if(pbr?.setMetallicFactor)try{pbr.setMetallicFactor(clamp(asFiniteNumber(controls.metallic,0),0,1))}catch{}
    if(material.setAlphaMode)try{material.setAlphaMode(controls.alphaCutout?'MASK':(sourceMaterial.alphaMode||'OPAQUE'))}catch{}
    if(controls.alphaCutout)setFirstAvailable(material,['setAlphaCutoff','alphaCutoff'],clamp(asFiniteNumber(controls.alphaCutoff,0.5),0,1));
    applyOptionalShaderControls(material,controls);
  }
}
function initViewerMaterialRuntime(){
  const model=document.querySelector('model-viewer.result-model');
  if(!model)return;
  const sync=()=>applyViewerMaterialControls();
  applyViewerMaterialControls();
  model.addEventListener('load',sync,{once:true});
  if(window.customElements?.whenDefined){
    window.customElements.whenDefined('model-viewer').then(()=>{
      requestAnimationFrame(sync);
      if(model.updateComplete?.then)model.updateComplete.then(sync).catch(()=>{});
    }).catch(()=>{});
  }
}
function initClayMeshRuntime(){
  const model=document.querySelector('model-viewer.mesh-clay-model');
  if(!model)return;
  const sync=()=>applyClayMeshMaterial(model);
  applyClayMeshMaterial(model);
  model.addEventListener('load',sync,{once:true});
  if(window.customElements?.whenDefined){
    window.customElements.whenDefined('model-viewer').then(()=>{
      requestAnimationFrame(sync);
      if(model.updateComplete?.then)model.updateComplete.then(sync).catch(()=>{});
    }).catch(()=>{});
  }
}
window.setViewerMaterialControl=(key,value)=>{
  const controls=ensureViewerMaterialControls(currentViewerMaterial(),currentViewerAssetKey());
  if(key==='baseColor'||key==='sssColor'){
    controls[key]=normalizeHexColor(value,controls[key]||'#ffffff');
    updateMatControlLabels(key,controls[key]);
  }else if(key==='environment'){
    controls.environment=String(value||'neutral');
    updateMatControlLabels(key,controls.environment);
  }else if(key==='channelSolo'||key==='colorManagement'){
    controls[key]=String(value||(key==='channelSolo'?'beauty':'aces'));
    updateMatControlLabels(key,controls[key]);
    if(key==='channelSolo')render();
  }else if(key==='alphaCutout'||key==='displacementEnabled'){
    controls[key]=value===true||value==='true';
    updateMatControlLabels(key,controls[key]);
    render();
  }else{
    const ranges={
      roughness:[0,1],
      metallic:[0,1],
      transmission:[0,1],
      ior:[1,2.5],
      sssWeight:[0,1],
      displacementScale:[0,0.1],
      alphaCutoff:[0,1],
      exposureEV:[-3,3],
      hdriRotation:[0,360]
    };
    const [min,max]=ranges[key]||[0,1];
    controls[key]=clamp(asFiniteNumber(value,controls[key]??0),min,max);
    updateMatControlLabels(key,controls[key]);
  }
  applyViewerMaterialControls();
};
window.resetViewerMaterialControls=()=>{
  S.viewer.mat={...materialDefaults(currentViewerMaterial()),assetKey:currentViewerAssetKey()};
  render();
};

  stopAll();
  resetSegUiCaches();
  const app=document.getElementById('app');
  if(S.page==='landing'){
    document.body.style.overflow='';
    app.innerHTML=renderLanding();
    requestAnimationFrame(()=>SR.forEach(r=>startV(`rc-${r.id}`,{ar:true,col:r.c})));
  }else if(S.page==='upload'){
    document.body.style.overflow='';
    app.innerHTML=renderUpload();
    queueDemoExamplesLoad();
  }else if(S.page==='segment'){
    document.body.style.overflow='';
    app.innerHTML=renderSegmentSelect();
  }else if(S.page==='processing'){
    document.body.style.overflow='';
    app.innerHTML=renderProcessing();
    if(!S.proc.failed)runProc();
  }else if(S.page==='viewer'){
    document.body.style.overflow='hidden';
    if(S.viewer.tab==='export')S.viewer.tab='result';

    app.innerHTML=renderViewer();
    if(app.querySelector('model-viewer'))ensureModelViewerLoaded();
    initViewerMaterialRuntime();
    initClayMeshRuntime();
    queueExportListLoad();
  }
  initSc();
  syncUrlState();

}
function queueExportListLoad(){
  if(S.exports?.error)return;
  if(!S.sid||S.exports?.loading||Array.isArray(S.exports?.items))return;
  setTimeout(loadExportList,0);
}
async function loadExportList(){
  if(!S.sid||S.exports?.loading||Array.isArray(S.exports?.items))return;
  S.exports={...(S.exports||{}),loading:true,error:null};
  try{
    const payload=await apiListExports(S.sid);
    S.exports={...(S.exports||{}),loading:false,error:null,items:payload.exports||[],busyFormat:S.exports?.busyFormat||null,downloadProgress:S.exports?.downloadProgress??null,selectedFormat:S.exports?.selectedFormat||'glb'};
  }catch(err){
    S.exports={...(S.exports||{}),loading:false,error:err.message,items:[],busyFormat:S.exports?.busyFormat||null,downloadProgress:S.exports?.downloadProgress??null,selectedFormat:S.exports?.selectedFormat||'glb'};
  }
  if(!refreshDownloadPicker())render();
}
function setExportFormat(format){
  if(S.exports?.busyFormat)return;
  S.exports={...(S.exports||{}),selectedFormat:format,error:null};
  if(!refreshDownloadPicker())render();
}
function stopExportProgress(){
  if(EXPORT_PROGRESS_TIMER){
    clearInterval(EXPORT_PROGRESS_TIMER);
    EXPORT_PROGRESS_TIMER=null;
  }
}
function currentMeshUrl(){
  return S.result?.mesh_url||S.job?.result?.mesh_url||'';
}
function refreshDownloadPicker(){
  const picker=document.querySelector('[data-download-picker]');
  if(!picker)return false;
  picker.outerHTML=renderDownloadPicker(currentMeshUrl());
  return true;
}
function updateExportProgressDom(){
  const progress=Math.max(0,Math.min(100,Math.round(S.exports?.downloadProgress??0)));
  const pct=document.querySelector('[data-download-pct]');
  const fill=document.querySelector('[data-download-fill]');
  if(pct)pct.textContent=`${progress}%`;
  if(fill)fill.style.width=`${progress}%`;
}
function startExportProgress(format,ceiling=88){
  stopExportProgress();
  S.exports={...(S.exports||{}),loading:false,error:null,busyFormat:format,downloadProgress:0,selectedFormat:format};
  if(!refreshDownloadPicker())render();
  updateExportProgressDom();
  EXPORT_PROGRESS_TIMER=setInterval(()=>{
    const current=Math.round(S.exports?.downloadProgress??0);
    if(current>=ceiling)return;
    const step=current<45?8:current<72?5:2;
    S.exports={...(S.exports||{}),downloadProgress:Math.min(ceiling,current+step)};
    updateExportProgressDom();
  },260);
}
function finishExportProgress(url,fileName){
  stopExportProgress();
  S.exports={...(S.exports||{}),downloadProgress:100};
  updateExportProgressDom();
  setTimeout(()=>{
    triggerDownload(url,fileName);
    S.exports={...(S.exports||{}),busyFormat:null,downloadProgress:null};
    if(!refreshDownloadPicker())render();
  },280);
}
function triggerDownload(url,fileName){
  if(!url)return;
  const a=document.createElement('a');
  a.href=`${url}${url.includes('?')?'&':'?'}download_v=${Date.now().toString(36)}`;
  a.download=fileName||'download';
  document.body.appendChild(a);
  a.click();
  a.remove();
}
async function createExportFormat(format,options={}){
  if(!S.sid)return;
  if(S.exports?.busyFormat&&(!options.progressStarted||S.exports.busyFormat!==format))return;
  if(!options.progressStarted)startExportProgress(format);
  try{
    const payload=await apiCreateExport(S.sid,format);
    const current=Array.isArray(S.exports.items)?S.exports.items:[];
    const next=current.length
      ?current.map((item)=>item.format===payload.format?{...item,...payload}:item)
      :defaultExportItems(S.result?.mesh_url||'').map((item)=>item.format===payload.format?{...item,...payload}:item);
    S.exports={...(S.exports||{}),loading:false,error:null,items:next,selectedFormat:payload.format||format};
    if(options.download!==false)finishExportProgress(payload.url,payload.file_name);
    else{
      stopExportProgress();
      S.exports={...(S.exports||{}),busyFormat:null,downloadProgress:null};
      if(!refreshDownloadPicker())render();
    }
  }catch(err){
    stopExportProgress();
    S.exports={...(S.exports||{}),loading:false,error:err.message,busyFormat:null,downloadProgress:null};
    if(!refreshDownloadPicker())render();
  }
}
function downloadSelectedFormat(){
  const meshUrl=currentMeshUrl();
  const selected=selectedExportItem(meshUrl);
  if(!selected||S.exports?.busyFormat)return;
  if(selected.available===false){
    S.exports={...(S.exports||{}),error:selected.reason||selected.note||'이 포맷은 현재 서버에서 변환할 수 없습니다.'};
    if(!refreshDownloadPicker())render();
    return;
  }
  startExportProgress(selected.format,selected.url?92:88);
  if(selected.url){
    setTimeout(()=>finishExportProgress(selected.url,selected.file_name||`object_mesh.${selected.format}`),520);
    return;
  }
  createExportFormat(selected.format,{progressStarted:true});
}
/* ══════════════ PROCESSING ANIMATION ══════════════ */
function runProc(){
  clearPolling();
  if(!S.sid)return;
  let pollInFlight=false;

  const updateProgressUI=(p)=>{
    S.proc={...S.proc,...p};
    const pe=document.getElementById('ppct');
    const pf=document.getElementById('ppf');
    const pd=document.getElementById('proc-desc');
    const pl=document.getElementById('proc-label');
    if(pe)pe.textContent=`${p.pct}%`;
    if(pf)pf.style.width=`${p.pct}%`;
    if(pd)pd.textContent=p.desc||'처리 중입니다.';
    if(pl){
      pl.textContent=p.label||'진행 중';
      pl.className=`api-banner ${p.failed?'err':'ok'}`;
    }
    const steps=activeSteps();
    document.querySelectorAll('.pstep').forEach((el2,i)=>{
      const s2=i<p.si?'done':i===p.si?(p.failed?'wait':'act'):'wait';
      el2.className='pstep '+s2;
      const ico=el2.querySelector('.psico');
      const name=el2.querySelector('.psn');
      const desc=el2.querySelector('.psd');
      const st=el2.querySelector('.pss');
      if(name&&steps[i])name.textContent=steps[i].l;
      if(desc&&steps[i])desc.textContent=steps[i].s;
      if(i<p.si){if(ico)ico.innerHTML=I.ck;if(st)st.textContent='완료'}
      else if(i===p.si){if(ico)ico.innerHTML=steps[i]?.i||'⚙️';if(st)st.textContent=p.failed?'':'처리 중'}
      else if(st)st.textContent='';
    });
  };

  const handlePoll=async()=>{
    if(pollInFlight)return;
    pollInFlight=true;
    try{
      const job=await apiGetJob(S.sid);
      S.job=job;
      S.pollFailures=0;
      S.mode='image';
      upsertRecentJob(job);
      updateProgressUI(resolveProgress(job));
      if(job.status==='failed'){
        notifyError(job.error||'작업이 실패했습니다.');
        clearPolling();
        S.proc={...resolveProgress(job),failed:true};
        upsertRecentJob(job);
        localStorage.removeItem(SESSION_KEY);
        render();
        return;
      }
      if(job.status==='completed'){
        updateProgressUI({pct:99,si:5,label:'Viewer 여는 중',desc:'생성된 GLB를 viewer에 연결하고 있습니다.',failed:false});
        if(enterViewerFromCompletedJob(job,viewerResultFromJob(job),true)){
          render();
          return;
        }
        S.resultFailures=(S.resultFailures||0)+1;
        S.proc={pct:98,si:5,label:'결과 조회 재시도 중',desc:'완료 상태는 확인됐지만 결과 URL을 아직 찾지 못했습니다.',failed:false};
        render();
      }
    }catch(err){
      S.pollFailures=(S.pollFailures||0)+1;
      if(S.pollFailures>=3){
        notifyError(`polling 실패: ${err.message}`);
        clearPolling();
        S.proc={...S.proc,failed:true};
        localStorage.removeItem(SESSION_KEY);
        render();
      }else{
        notifyInfo(`상태 조회 재시도 중... (${S.pollFailures}/3)`);
        render();
      }
    }finally{
      pollInFlight=false;
    }
  };

  handlePoll();
  S.pollingTimer=setInterval(handlePoll,1800);
}

  rebuildSegMapLayerCache();

function preloadSegMasks(candidates){
  for(const candidate of candidates||[]){
    if(!candidate?.mask_url||SEG_MASK_CACHE[candidate.candidate_id])continue;
    const img=new Image();
    img.onload=()=>{
      try{
        const maxW=320;
        const ratio=(img.naturalHeight||1)/(img.naturalWidth||1);
        const w=maxW;
        const h=Math.max(1,Math.round(maxW*ratio));
        const canvas=document.createElement('canvas');
        canvas.width=w;
        canvas.height=h;
        const ctx=canvas.getContext('2d',{willReadFrequently:true});
        ctx.drawImage(img,0,0,w,h);
        SEG_MASK_CACHE[candidate.candidate_id]={w,h,data:ctx.getImageData(0,0,w,h).data};
      }catch(err){
        SEG_MASK_CACHE[candidate.candidate_id]={error:String(err)};
      }
    };
    img.onerror=()=>{SEG_MASK_CACHE[candidate.candidate_id]={error:'mask_load_failed'}};
    img.src=candidate.mask_url;
  }
}

function segPointFromMapEvent(event){
  const img=document.getElementById('seg-map-img');
  if(!img)return null;
  const rect=img.getBoundingClientRect();
  if(!rect.width||!rect.height)return null;
  if(event.clientX<rect.left||event.clientX>rect.right||event.clientY<rect.top||event.clientY>rect.bottom)return null;
  const nx=(event.clientX-rect.left)/rect.width;
  const ny=(event.clientY-rect.top)/rect.height;
  const width=Number(img.naturalWidth||S.seg.map?.imageSize?.width||0);
  const height=Number(img.naturalHeight||S.seg.map?.imageSize?.height||0);
  return {nx,ny,x:nx*width,y:ny*height,clientX:event.clientX,clientY:event.clientY};
}

function maskContains(candidate,point){
  if(!candidate||!point)return false;
  if(Array.isArray(candidate.bbox)&&candidate.bbox.length===4&&S.seg.map?.imageSize){
    const [x1,y1,w,h]=candidate.bbox.map(Number);
    const x2=x1+w;
    const y2=y1+h;
    const pad=Math.max(S.seg.map.imageSize.width,S.seg.map.imageSize.height)*0.01;
    if(point.x<x1-pad||point.x>x2+pad||point.y<y1-pad||point.y>y2+pad)return false;
  }
  const cache=SEG_MASK_CACHE[candidate.candidate_id];
  if(!cache||!cache.data)return true;
  const px=Math.max(0,Math.min(cache.w-1,Math.round(point.nx*(cache.w-1))));
  const py=Math.max(0,Math.min(cache.h-1,Math.round(point.ny*(cache.h-1))));
  for(let oy=-2;oy<=2;oy++){
    for(let ox=-2;ox<=2;ox++){
      const x=Math.max(0,Math.min(cache.w-1,px+ox));
      const y=Math.max(0,Math.min(cache.h-1,py+oy));
      const i=(y*cache.w+x)*4;
      const value=Math.max(cache.data[i],cache.data[i+1],cache.data[i+2]);
      if(value>40)return true;
    }
  }
  return false;
}

function hitSegCandidate(event){
  const point=segPointFromMapEvent(event);
  if(!point)return null;
  const rankedCandidates=S.seg.map?.hitCandidates?.length
    ?S.seg.map.hitCandidates
    :sortSegHitCandidates(S.seg.candidates||[]);
  for(const candidate of rankedCandidates){
    if(maskContains(candidate,point))return candidate;
  }
  return null;
}

function updateSegMapDom(hoverId,event){
  if(SEG_MAP_LAST_HOVER_ID!==hoverId){
    segMapLayer(SEG_MAP_LAST_HOVER_ID)?.classList.remove('is-hover');
    segMapLayer(hoverId)?.classList.add('is-hover');
    SEG_MAP_LAST_HOVER_ID=hoverId||null;
  }
  const cursor=document.getElementById('seg-map-cursor');
  if(!cursor)return;
  const candidate=(S.seg.candidates||[]).find(item=>item.candidate_id===hoverId);
  if(!candidate||!event){
    cursor.style.display='none';
    SEG_MAP_LAST_CURSOR_ID=null;
    return;
  }
  const stage=document.getElementById('seg-map-canvas');
  const rect=stage?.getBoundingClientRect();
  if(!rect){
    cursor.style.display='none';
    SEG_MAP_LAST_CURSOR_ID=null;
    return;
  }
  if(SEG_MAP_LAST_CURSOR_ID!==hoverId){
    cursor.innerHTML=`<img src="${candidate.segmented_preview_url||candidate.segmented_url||candidate.overlay_url}" alt=""><div class="seg-name">${candidateLabel(candidate)}</div><div class="seg-meta">클릭해서 선택 · 면적 ${(candidate.area_ratio*100).toFixed(1)}%</div>`;
    SEG_MAP_LAST_CURSOR_ID=hoverId;
  }
  cursor.style.display='block';
  const x=Math.min(Math.max(event.clientX-rect.left+18,8),Math.max(8,rect.width-230));
  const y=Math.min(Math.max(event.clientY-rect.top+18,8),Math.max(8,rect.height-170));
  cursor.style.left=`${x}px`;
  cursor.style.top=`${y}px`;
}

window.segMapMove=(event)=>{

};

function segPromptPointFromEvent(event){
  const img=document.getElementById('seg-prompt-img');
  if(!img)return null;
  const rect=img.getBoundingClientRect();
  if(!rect.width||!rect.height)return null;
  const width=Number(img.naturalWidth||S.seg.prompt?.imageSize?.width||0);
  const height=Number(img.naturalHeight||S.seg.prompt?.imageSize?.height||0);
  if(!width||!height)return null;
  const cx=Math.max(rect.left,Math.min(event.clientX,rect.right));
  const cy=Math.max(rect.top,Math.min(event.clientY,rect.bottom));
  return {
    x:((cx-rect.left)/rect.width)*width,
    y:((cy-rect.top)/rect.height)*height
  };
}

function updateSegPromptDragDom(box){
  const prompt=ensureSegPrompt();
  const size=prompt.imageSize||{};
  const w=Number(size.width||0);
  const h=Number(size.height||0);
  const host=document.getElementById('seg-prompt-canvas');
  if(!host||!w||!h||!box)return;
  let el=document.getElementById('seg-live-box');
  if(!el){
    el=document.createElement('span');
    el.id='seg-live-box';
    el.className='seg-box';
    host.appendChild(el);
  }
  const x1=Math.min(box[0],box[2]);
  const y1=Math.min(box[1],box[3]);
  const x2=Math.max(box[0],box[2]);
  const y2=Math.max(box[1],box[3]);
  el.style.left=`${(x1/w)*100}%`;
  el.style.top=`${(y1/h)*100}%`;
  el.style.width=`${((x2-x1)/w)*100}%`;
  el.style.height=`${((y2-y1)/h)*100}%`;
}

function clearSegPromptDragDom(){
  if(SEG_PROMPT_DRAG_FRAME){
    cancelAnimationFrame(SEG_PROMPT_DRAG_FRAME);
    SEG_PROMPT_DRAG_FRAME=null;
  }
  SEG_PROMPT_PENDING_BOX=null;
  document.getElementById('seg-live-box')?.remove();
}

function clearSegPromptPreviewTimer(){
  if(SEG_PROMPT_PREVIEW_TIMER){
    clearTimeout(SEG_PROMPT_PREVIEW_TIMER);
    SEG_PROMPT_PREVIEW_TIMER=null;
  }
}

function schedulePromptPreview(){
  const prompt=ensureSegPrompt();
  clearSegPromptPreviewTimer();
  if(prompt.loading||prompt.drag)return;
  if(!(prompt.points||[]).length&&!prompt.box)return;
  SEG_PROMPT_PREVIEW_TIMER=setTimeout(()=>{
    window.generatePromptCandidate(true);
  },280);
}

function addSegPromptPoint(point,label){
  if(!point)return;
  const prompt=ensureSegPrompt();
  invalidateSegPromptPreview();
  prompt.points=[...(prompt.points||[]),{x:point.x,y:point.y,label:Number(label)>0?1:0}];
  prompt.preview=null;
  prompt.error=null;
}

window.segPromptDown=(event)=>{
  if(S.seg?.loading)return;
  if(event.button!==0||event.isPrimary===false)return;
  const point=segPromptPointFromEvent(event);
  if(!point)return;
  const prompt=ensureSegPrompt();
  cancelSegPromptWork();
  event.currentTarget?.setPointerCapture?.(event.pointerId);
  prompt.drag={start:point,box:[point.x,point.y,point.x,point.y]};
  prompt.error=null;
  updateSegPromptDragDom(prompt.drag.box);
  event.preventDefault();
};

window.segPromptMove=(event)=>{
  const prompt=ensureSegPrompt();
  if(!prompt.drag)return;
  const point=segPromptPointFromEvent(event);
  if(!point)return;
  prompt.drag.box=[prompt.drag.start.x,prompt.drag.start.y,point.x,point.y];
  event.preventDefault();
  SEG_PROMPT_PENDING_BOX=[...prompt.drag.box];
  if(SEG_PROMPT_DRAG_FRAME)return;
  SEG_PROMPT_DRAG_FRAME=requestAnimationFrame(()=>{
    SEG_PROMPT_DRAG_FRAME=null;
    const box=SEG_PROMPT_PENDING_BOX;
    SEG_PROMPT_PENDING_BOX=null;
    if(box)updateSegPromptDragDom(box);
  });
};

window.segPromptCancel=(event)=>{
  const prompt=ensureSegPrompt();
  if(!prompt.drag)return;
  if(event?.currentTarget?.hasPointerCapture?.(event.pointerId)){
    event.currentTarget.releasePointerCapture(event.pointerId);
  }
  prompt.drag=null;
  clearSegPromptDragDom();
};

window.segPromptUp=(event)=>{
  const prompt=ensureSegPrompt();
  if(!prompt.drag)return;
  const point=segPromptPointFromEvent(event);
  const start=prompt.drag.start;
  if(event?.currentTarget?.hasPointerCapture?.(event.pointerId)){
    event.currentTarget.releasePointerCapture(event.pointerId);
  }
  prompt.drag=null;
  clearSegPromptDragDom();
  if(!point||!start)return;
  const dx=Math.abs(point.x-start.x);
  const dy=Math.abs(point.y-start.y);
  if(dx<10&&dy<10){
    addSegPromptPoint(point,(prompt.labelType||'positive')==='negative'?0:1);
  }else{
    invalidateSegPromptPreview();
    prompt.box=[Math.min(start.x,point.x),Math.min(start.y,point.y),Math.max(start.x,point.x),Math.max(start.y,point.y)];
    prompt.preview=null;
  }
  prompt.error=null;
  render();
  schedulePromptPreview();
};

window.segPromptContext=(event)=>{
  event.preventDefault();
  if(S.seg?.loading)return;
  const point=segPromptPointFromEvent(event);
  if(!point)return;
  const prompt=ensureSegPrompt();
  addSegPromptPoint(point,(prompt.labelType||'positive')==='positive'?0:1);
  render();
  schedulePromptPreview();
};

window.removeSegPromptPoint=(event,index)=>{
  event?.stopPropagation?.();
  event?.preventDefault?.();
  const prompt=ensureSegPrompt();
  invalidateSegPromptPreview();
  prompt.points=(prompt.points||[]).filter((_,i)=>i!==index);
  prompt.preview=null;
  render();
  schedulePromptPreview();
};

window.undoSegPromptPoint=()=>{
  const prompt=ensureSegPrompt();
  invalidateSegPromptPreview();
  prompt.points=(prompt.points||[]).slice(0,-1);
  prompt.preview=null;

  S.seg.prompt={points:[],box:null,labelType:S.seg.prompt?.labelType||'positive',loading:false,error:null,drag:null,imageSize:S.seg.prompt?.imageSize||null};
  if(S.seg.text)S.seg.text.error=null;

window.generateTextPromptCandidate=async()=>{
  if(!S.pendingUpload?.job_id){notifyError('업로드된 이미지가 없습니다.');render();return;}
  const text=ensureSegText();
  const promptText=(text.prompt||'').trim();
  if(!promptText){notifyError('찾을 객체 이름을 입력해 주세요.');render();return;}
  const requestSeq=++SEG_PROMPT_REQUEST_SEQ;
  clearSegPromptPreviewTimer();
  text.loading=true;
  text.error=null;
  S.seg.error=null;
  S.seg.enhance={loading:false,error:null,candidateId:null};
  render();
  try{
    const payload=await apiCreateSegTextPrompt(S.pendingUpload.job_id,{
      prompt:promptText,
      confidence_threshold:Number(text.confidenceThreshold||0.5),
      merge_mode:text.mergeMode||'best'
    });
    if(requestSeq!==SEG_PROMPT_REQUEST_SEQ)return;
    const textCandidate=(payload.candidates||[])[0]||null;
    const oldCandidates=S.seg.candidates||[];
    const incomingIds=new Set((payload.candidates||[]).map((candidate)=>candidate.candidate_id));
    S.seg.candidates=[...(payload.candidates||[]),...oldCandidates.filter((candidate)=>!incomingIds.has(candidate.candidate_id))];
    S.seg.inputUrl=payload.input_url||S.seg.inputUrl;
    S.seg.selectedId=payload.selected_candidate_id||(textCandidate?.candidate_id||S.seg.selectedId);
    S.seg.error=null;
    S.seg.map={...(S.seg.map||{}),hitCandidates:sortSegHitCandidates(S.seg.candidates||[])};
  }catch(err){
    if(requestSeq!==SEG_PROMPT_REQUEST_SEQ)return;
    text.error=err.message;
    S.seg.error=err.message;
    notifyError(`객체 찾기 실패: ${err.message}`);
  }finally{
    if(requestSeq!==SEG_PROMPT_REQUEST_SEQ)return;
    text.loading=false;
    render();
  }
};

window.generatePromptCandidate=async(silent=false)=>{
  if(!S.pendingUpload?.job_id){notifyError('업로드된 이미지가 없습니다.');render();return;}
  if(S.seg?.loading){notifyInfo('cutout 준비 중입니다.');render();return;}
  const prompt=ensureSegPrompt();
  clearSegPromptPreviewTimer();
  if(!(prompt.points||[]).length&&!prompt.box){notifyError('이미지에서 객체를 클릭하거나 박스로 선택해 주세요.');render();return;}
  const requestSeq=++SEG_PROMPT_REQUEST_SEQ;
  prompt.loading=true;
  prompt.error=null;
  S.seg.enhance={loading:false,error:null,candidateId:null};
  render();
  try{
    const payload=await apiCreateSegPrompt(S.pendingUpload.job_id,{
      points:prompt.points||[],
      box:prompt.box||null
    });
    if(requestSeq!==SEG_PROMPT_REQUEST_SEQ)return;
    const promptCandidate=(payload.candidates||[])[0]||null;
    const oldCandidates=S.seg.candidates||[];
    const promptIds=new Set((payload.candidates||[]).map((candidate)=>candidate.candidate_id));
    S.seg.candidates=[...(payload.candidates||[]),...oldCandidates.filter((candidate)=>!promptIds.has(candidate.candidate_id))];
    S.seg.inputUrl=payload.input_url||S.seg.inputUrl;
    S.seg.selectedId=payload.selected_candidate_id||(promptCandidate?.candidate_id||S.seg.selectedId);
    S.seg.error=null;
    S.seg.map={...(S.seg.map||{}),hitCandidates:sortSegHitCandidates(S.seg.candidates||[])};
    prompt.preview=promptCandidate;
  }catch(err){
    if(requestSeq!==SEG_PROMPT_REQUEST_SEQ)return;
    prompt.error=err.message;
    S.seg.error=err.message;
    if(!silent)notifyError(`직접 선택 실패: ${err.message}`);
  }finally{
    if(requestSeq!==SEG_PROMPT_REQUEST_SEQ)return;
    prompt.loading=false;
    render();
  }
};

window.enhanceSelectedCutout=async()=>{
  if(S.busy)return;
  if(!S.pendingUpload?.job_id){notifyError('업로드된 이미지가 없습니다.');render();return;}
  const selected=selectedSegCandidate();
  if(!selected){notifyError('강화할 cutout을 먼저 선택해 주세요.');render();return;}
  const enhance=ensureSegEnhance();
  if(enhance.loading)return;
  if(String(selected.candidate_id||'').endsWith('_enhanced')){
    notifyInfo('이미 강화된 cutout입니다.');
    return;
  }
  try{
    enhance.loading=true;
    enhance.error=null;
    enhance.candidateId=selected.candidate_id;
    notifyInfo('선택 영역을 확대하고 해상도를 강화하는 중입니다...');
    render();
    const payload=await apiEnhanceSegCandidate(S.pendingUpload.job_id,selected.candidate_id);
    const oldCandidates=S.seg.candidates||[];
    const incoming=payload.candidates||[];
    const incomingIds=new Set(incoming.map((candidate)=>candidate.candidate_id));
    S.seg.candidates=[...incoming,...oldCandidates.filter((candidate)=>!incomingIds.has(candidate.candidate_id))];
    S.seg.inputUrl=payload.input_url||S.seg.inputUrl;
    S.seg.selectedId=payload.selected_candidate_id||S.seg.selectedId;
    S.seg.map={...(S.seg.map||{}),hitCandidates:sortSegHitCandidates(S.seg.candidates||[])};
    for(const candidate of incoming){
      delete SEG_MASK_CACHE[candidate.candidate_id];
    }
    notifyInfo('해상도 강화 완료 · 강화된 cutout이 3D 입력으로 선택되었습니다.');
  }catch(err){
    enhance.error=err.message;
    notifyError(`해상도 강화 실패: ${err.message}`);
  }finally{
    enhance.loading=false;
    render();
  }
};

  }
  try{
    clearPolling();
    S.sid=id;
    S.pollFailures=0;
    S.resultFailures=0;
    S.page='processing';

    const job=await apiGetJob(id);

window.setMode=()=>{
  S.mode='image';
  S.files=[];
  S.err=null;
  S.info=null;
  resetTransient();
  render();
};

window.onFiles=(files)=>{
  const arr=Array.from(files||[]);
  const nf=arr
    .filter((file)=>file.type.startsWith('image')||/\.(jpe?g|png|webp|tiff?|bmp|heic|raw)$/i.test(file.name||''))
    .map(f=>({id:Math.random().toString(36).slice(2),name:f.name,type:'image',size:f.size,dataUrl:URL.createObjectURL(f),file:f}));
  S.files=nf.slice(0,1);
  S.err=null;
  S.info=null;
  resetTransient();
  render();
};

window.onDrop=(e)=>{e.preventDefault();document.getElementById('dz')?.classList.remove('ov');onFiles(e.dataTransfer.files)};
window.rmF=(i)=>{S.files.splice(i,1);resetTransient();render()};
window.clearF=()=>{S.files=[];resetTransient();render()};
window.setImagePrompt=(value)=>{S.imagePrompt=value||''};
window.selectDemoExample=async(id)=>{
  const item=(S.demoExamples?.items||[]).find((candidate)=>candidate.id===id);
  if(!item||S.busy)return;
  try{
    S.busy=true;
    notifyInfo('예시 이미지를 선택하는 중입니다...');
    render();
    const response=await fetch(buildUrl(item.url));
    if(!response.ok)throw new Error(`${response.status} ${response.statusText}`);
    const blob=await response.blob();
    const file=new File([blob],item.file_name,{type:blob.type||'image/webp'});
    resetTransient();
    S.files=[{
      id:`demo_${item.id}`,
      name:item.file_name,
      type:'image',
      size:file.size,
      dataUrl:URL.createObjectURL(file),
      file
    }];
    S.info='TRELLIS.2 예시 이미지를 선택했습니다.';
    S.err=null;
  }catch(err){
    notifyError(`예시 선택 실패: ${err.message}`);
  }finally{
    S.busy=false;
    render();
  }
};

function imageJobOptions(extra={}){
  return{
    requested_reconstruction_head:'trellis',
    image_quality_mode:'high_quality',
    source_prompt:(S.seg?.text?.prompt||S.imagePrompt||'').trim(),
    ...extra
  };
}

async function createAndStartJobWithOptions(options={}){
  if(!S.pendingUpload?.job_id)return;
  stopSegLoadingProgress();
  const type='image_to_3d';
  notifyInfo('job 생성 중...');
  render();
  const created=await apiCreateJob(S.pendingUpload.job_id,type,options);
  S.sid=S.pendingUpload.job_id;
  S.pollFailures=0;
  S.resultFailures=0;
  S.job=created;
  upsertRecentJob(created);
  S.page='processing';
  S.proc=resolveProgress(created);
  render();
}

async function uploadCurrentImageIfNeeded(){
  if(S.pendingUpload?.job_id)return S.pendingUpload;
  if(!S.files.length)throw new Error('선택된 이미지가 없습니다.');
  notifyInfo('업로드 중입니다...');
  render();
  const upload=await apiUpload('image_to_3d',S.files[0].file);
  S.pendingUpload=upload;
  S.sid=upload.job_id;
  S.pollFailures=0;
  S.resultFailures=0;
  return upload;
}

  if(S.busy||!S.files.length)return;

  try{

    notifyInfo('업로드 중입니다...');

    S.sid=upload.job_id;
    S.pollFailures=0;
    S.resultFailures=0;
    S.busy=false;
    S.page='segment';
    S.seg={
      loading:false,
      error:null,
      inputUrl:'',
      selectedId:null,
      candidates:[],
      map:{hoverId:null,loading:false,error:null},
      enhance:{loading:false,error:null,candidateId:null},
      text:{prompt:(S.imagePrompt||'').trim(),loading:false,error:null,confidenceThreshold:0.5,mergeMode:'best'},
      prompt:{points:[],box:null,labelType:'positive',loading:false,error:null,drag:null,imageSize:null}
    };

    notifyError(`시작 실패: ${err.message}`);

  if(S.viewer.tab===tab)return false;

  render();
  return false;
};
window.setSceneTab=(tab)=>{
  if(!['viewer','mesh'].includes(tab))return false;
  if(S.viewer.sceneTab===tab)return false;
  S.viewer.sceneTab=tab;
  render();
  return false;
};
window.setActiveInputThumb=(index)=>{

  render();

window.setVM=(m)=>{S.viewer.vm=m;render()};
window.togR=()=>{S.viewer.ar=!S.viewer.ar;const v=VW['mc'];if(v)v.ar=S.viewer.ar;render()};
window.togH=()=>{S.viewer.hs=!S.viewer.hs;render()};
window.togSB=()=>{S.viewer.sb=!S.viewer.sb;render()};
function applyViewerTabHash(){
  const raw=(window.location.hash||'').replace(/^#/,'');
  if(!raw||!raw.includes('='))return false;
  const params=new URLSearchParams(raw);
  const scene=params.get('scene');
  const tab=params.get('tab');
  let changed=false;
  if(['viewer','mesh'].includes(scene)&&S.viewer.sceneTab!==scene){
    S.viewer.sceneTab=scene;
    changed=true;
  }
  if(['result','quality'].includes(tab)&&S.viewer.tab!==tab){
    S.viewer.tab=tab;
    changed=true;
  }
  if(changed&&S.page==='viewer')render();
  return changed;
}
window.addEventListener('hashchange',applyViewerTabHash);
function initSc(){
  const h=document.getElementById('mhdr');if(!h)return;
  const fn=()=>{const s=window.scrollY>20;if(s!==S.scrolled){S.scrolled=s;h.className='hdr'+(s?' solid':'')}};
  window.removeEventListener('scroll',window._sh);window._sh=fn;window.addEventListener('scroll',fn,{passive:true});
}
function bootstrapFromQuery(){
  S.recent=getRecentJobs();
  const q=new URLSearchParams(window.location.search);
  if(q.get('reset')==='1'){
    localStorage.removeItem(SESSION_KEY);
    localStorage.removeItem(RECENT_KEY);
    S.recent=[];
    const url=new URL(window.location.href);
    url.searchParams.delete('reset');
    history.replaceState({},'',url.toString());
  }
  const jobId=(q.get('jobId')||'').trim();
  const pageParam=(q.get('page')||'').trim();
  const tabParam=(q.get('tab')||'').trim();
  const viewParam=(q.get('view')||'').trim();
  if(['result','quality'].includes(tabParam))S.viewer.tab=tabParam;
  if(tabParam==='mesh'||viewParam==='mesh')S.viewer.sceneTab='mesh';
  applyViewerTabHash();
  S.mode='image';
  if(!jobId){
    if(pageParam==='upload')S.page='upload';
    if(pageParam==='segment')S.page='upload';
    return;
  }
  S.sid=jobId;
  S.page='processing';
  S.proc={pct:8,si:0,label:'job 복원 중',desc:'URL/세션의 jobId를 복원하고 있습니다.',failed:false};
}
bootstrapFromQuery();
render();
</script>
